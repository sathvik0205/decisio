<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decisio ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fef6f0;
    --white: #ffffff;
    --pink: #ffb3c6;
    --pink-light: #fff0f4;
    --purple: #c9b8ff;
    --purple-light: #f3efff;
    --mint-light: #edfaf4;
    --yellow-light: #fff8e6;
    --peach-light: #fff4ec;
    --red-light: #ffe0e0;
    --red: #ff8fab;
    --text: #3d2c4e;
    --text-mid: #7a6890;
    --text-light: #b0a0c0;
    --border: #ede0f5;
    --shadow: 0 4px 20px rgba(180,140,220,0.12);
    --shadow-sm: 0 2px 10px rgba(180,140,220,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    top: -120px; right: -120px;
    width: 400px; height: 400px;
    background: radial-gradient(circle, #ffd6e080 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; left: -100px;
    width: 360px; height: 360px;
    background: radial-gradient(circle, #c9b8ff40 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 820px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  header { text-align: center; margin-bottom: 40px; }

  .header-emoji {
    font-size: 48px; margin-bottom: 10px; display: block;
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  h1 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(28px, 6vw, 44px);
    margin-bottom: 8px;
    background: linear-gradient(135deg, #c9b8ff, #ffb3c6, #ffd166);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline { color: var(--text-mid); font-size: 15px; font-weight: 500; }

  .card {
    background: var(--white);
    border-radius: 24px;
    padding: 32px;
    box-shadow: var(--shadow);
    border: 1.5px solid var(--border);
    margin-bottom: 20px;
  }

  .field-label {
    font-size: 13px; font-weight: 800;
    color: var(--text-mid);
    letter-spacing: 0.05em; text-transform: uppercase;
    margin-bottom: 10px;
  }

  textarea, input[type="text"] {
    width: 100%;
    background: #faf7fd;
    border: 1.5px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 500;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    line-height: 1.6;
  }

  textarea { min-height: 110px; resize: vertical; }

  textarea:focus, input[type="text"]:focus {
    border-color: var(--purple);
    box-shadow: 0 0 0 3px rgba(201,184,255,0.2);
  }

  textarea::placeholder, input::placeholder { color: var(--text-light); }

  .options-wrap { margin-top: 24px; }

  .options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }

  .option-row { display: flex; gap: 8px; align-items: center; }

  .option-pill {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: white; font-size: 11px; font-weight: 800;
    padding: 4px 10px; border-radius: 20px;
    flex-shrink: 0; min-width: 32px; text-align: center;
  }

  .btn-remove {
    background: var(--red-light); border: none; color: var(--red);
    width: 34px; height: 34px; border-radius: 10px;
    cursor: pointer; font-size: 18px; display: grid; place-items: center;
    transition: all 0.15s; flex-shrink: 0;
  }

  .btn-remove:hover { background: var(--red); color: white; }

  .btn-add {
    background: var(--purple-light);
    border: 1.5px dashed var(--purple);
    color: #8b7acc; padding: 10px 18px; border-radius: 12px;
    cursor: pointer; font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700; transition: all 0.2s;
  }

  .btn-add:hover { background: var(--purple); color: white; border-style: solid; }

  .btn-analyze {
    width: 100%;
    background: linear-gradient(135deg, #c9b8ff, #ffb3c6);
    color: white; border: none; border-radius: 16px;
    padding: 18px; font-family: 'Nunito', sans-serif;
    font-size: 16px; font-weight: 800; cursor: pointer;
    margin-top: 24px; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    box-shadow: 0 4px 16px rgba(201,184,255,0.4);
  }

  .btn-analyze:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(201,184,255,0.5);
  }

  .btn-analyze:disabled { opacity: 0.6; cursor: not-allowed; }

  .spinner {
    width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.4);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.7s linear infinite; display: none;
  }

  .btn-analyze.loading .spinner { display: block; }
  .btn-analyze.loading .btn-text { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: var(--red-light); border: 1.5px solid var(--red);
    border-radius: 12px; padding: 14px 18px;
    color: #c0385a; font-size: 13px; font-weight: 600;
    margin-top: 14px; display: none;
  }

  #results {
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.5s, transform 0.5s;
    pointer-events: none;
  }

  #results.visible { opacity: 1; transform: translateY(0); pointer-events: all; }

  .section-title {
    font-family: 'Pacifico', cursive;
    font-size: 20px; color: var(--text);
    margin: 36px 0 16px;
    display: flex; align-items: center; gap: 10px;
  }

  .options-grid {
    display: grid; gap: 16px;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  }

  .option-card {
    background: var(--white); border-radius: 20px; padding: 22px;
    border: 1.5px solid var(--border); box-shadow: var(--shadow-sm);
    animation: fadeUp 0.4s ease both; position: relative; overflow: hidden;
  }

  .option-card.best-card {
    border-color: var(--purple);
    box-shadow: 0 4px 20px rgba(201,184,255,0.25);
  }

  .best-badge {
    position: absolute; top: 14px; right: 14px;
    background: linear-gradient(135deg, #c9b8ff, #ffb3c6);
    color: white; font-size: 10px; font-weight: 800;
    padding: 3px 10px; border-radius: 20px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .opt-name {
    font-size: 15px; font-weight: 800; color: var(--text);
    margin-bottom: 10px; padding-right: 70px; line-height: 1.3;
  }

  .score-chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; font-weight: 700;
    padding: 4px 12px; border-radius: 20px; margin-bottom: 14px;
  }
  .score-chip.high { background: var(--mint-light); color: #2a9060; }
  .score-chip.medium { background: var(--yellow-light); color: #c08800; }
  .score-chip.low { background: var(--red-light); color: #c0385a; }

  .opt-section { margin-bottom: 13px; }

  .opt-section-label {
    font-size: 11px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 7px;
  }

  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }

  .tag {
    font-size: 12px; font-weight: 600;
    padding: 4px 11px; border-radius: 20px; line-height: 1.4;
  }
  .tag.pro { background: var(--mint-light); color: #2a9060; }
  .tag.con { background: var(--red-light); color: #c0385a; }
  .tag.risk { background: var(--yellow-light); color: #a07000; }

  .outcome-box {
    background: #faf7fd; border-radius: 12px;
    padding: 10px 13px; font-size: 13px;
    color: var(--text-mid); line-height: 1.55;
    font-weight: 500;
  }

  .table-wrap {
    background: var(--white); border-radius: 20px;
    overflow: hidden; border: 1.5px solid var(--border);
    box-shadow: var(--shadow-sm); overflow-x: auto;
  }

  .compare-table { width: 100%; border-collapse: collapse; font-size: 13px; }

  .compare-table th {
    background: linear-gradient(135deg, #f3efff, #fff0f4);
    font-size: 12px; font-weight: 800; color: var(--text-mid);
    padding: 13px 16px; text-align: left;
    border-bottom: 1.5px solid var(--border);
  }

  .compare-table td {
    padding: 12px 16px; border-bottom: 1px solid #f5eff8;
    color: var(--text-mid); font-weight: 500;
    line-height: 1.5; vertical-align: top;
  }

  .compare-table tr:last-child td { border-bottom: none; }
  .compare-table td:first-child { font-weight: 700; color: var(--text); }
  .compare-table td.winner-cell { background: #faf7ff; color: var(--text); font-weight: 700; }

  .verdict-card {
    background: var(--white); border-radius: 24px; padding: 32px;
    border: 2px solid var(--purple);
    box-shadow: 0 8px 32px rgba(201,184,255,0.2);
    position: relative; overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .verdict-card::before {
    content: '✨'; position: absolute;
    right: 28px; top: 24px; font-size: 52px; opacity: 0.15;
  }

  .verdict-eyebrow {
    font-size: 12px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: #8b7acc; margin-bottom: 6px;
  }

  .verdict-winner {
    font-family: 'Pacifico', cursive;
    font-size: clamp(20px, 4vw, 26px);
    background: linear-gradient(135deg, #c9b8ff, #ffb3c6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 20px; line-height: 1.3;
  }

  .verdict-section { margin-bottom: 20px; }

  .verdict-section-label {
    font-size: 12px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-mid); margin-bottom: 7px;
  }

  .verdict-section-content {
    font-size: 14px; font-weight: 500; color: var(--text);
    line-height: 1.7; background: #faf7fd;
    border-radius: 12px; padding: 12px 15px;
  }

  .conf-row { display: flex; align-items: center; gap: 12px; margin-top: 8px; }

  .conf-track {
    flex: 1; height: 8px; background: var(--border);
    border-radius: 20px; overflow: hidden;
  }

  .conf-fill {
    height: 100%; border-radius: 20px;
    background: linear-gradient(90deg, var(--purple), var(--pink));
    transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .conf-chip {
    font-size: 12px; font-weight: 800;
    padding: 4px 12px; border-radius: 20px;
  }
  .conf-chip.high { background: var(--mint-light); color: #2a9060; }
  .conf-chip.medium { background: var(--yellow-light); color: #a07000; }
  .conf-chip.low { background: var(--red-light); color: #c0385a; }

  .exec-steps { display: flex; flex-direction: column; gap: 10px; }

  .exec-step { display: flex; gap: 12px; align-items: flex-start; }

  .step-bubble {
    background: linear-gradient(135deg, var(--purple), var(--pink));
    color: white; width: 26px; height: 26px;
    border-radius: 50%; font-size: 11px; font-weight: 800;
    display: grid; place-items: center; flex-shrink: 0;
  }

  .step-text {
    font-size: 13px; font-weight: 600;
    color: var(--text); line-height: 1.6; padding-top: 3px;
  }

  .footer-note {
    margin-top: 52px; text-align: center;
    font-size: 13px; color: var(--text-light); font-weight: 500;
  }

  @media (max-width: 600px) {
    .card { padding: 20px 16px; }
    .options-grid { grid-template-columns: 1fr; }
    .verdict-card { padding: 22px 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <span class="header-emoji">🧠</span>
    <h1>Decisio</h1>
    <p class="tagline">a decision making engine ✨</p>
  </header>

  <div class="card">
    <div class="field-label">🌸 What's the situation?</div>
    <textarea id="situation" placeholder="Describe your situation, what's at stake, and any important context. More detail = sharper analysis!"></textarea>

    <div class="options-wrap">
      <div class="field-label">🌿 Your Options</div>
      <div class="options-list" id="optionsList">
        <div class="option-row">
          <span class="option-pill">A</span>
          <input type="text" placeholder="Option A…" />
          <button class="btn-remove" onclick="removeOption(this)">×</button>
        </div>
        <div class="option-row">
          <span class="option-pill">B</span>
          <input type="text" placeholder="Option B…" />
          <button class="btn-remove" onclick="removeOption(this)">×</button>
        </div>
      </div>
      <button class="btn-add" onclick="addOption()">＋ Add another option</button>
    </div>

    <button class="btn-analyze" id="analyzeBtn" onclick="analyze()">
      <div class="spinner"></div>
      <span class="btn-text">✨ Analyze My Decision</span>
    </button>
    <div class="error-box" id="errorBox"></div>
  </div>

  <div id="results">
    <div class="section-title">🔍 Option Breakdown</div>
    <div class="options-grid" id="optionCards"></div>

    <div class="section-title">📊 Comparison</div>
    <div class="table-wrap"><table class="compare-table" id="compareTable"></table></div>

    <div class="section-title">🏆 The Verdict</div>
    <div id="verdictBlock"></div>
  </div>

  <p class="footer-note">Powered by Groq · Logic over emotion · Long-term over comfort 💜</p>
</div>

<script>
const LABELS = ['A','B','C','D','E','F','G','H'];

function updateLabels() {
  document.querySelectorAll('.option-row').forEach((row, i) => {
    row.querySelector('.option-pill').textContent = LABELS[i] || (i+1);
  });
}

function addOption() {
  const list = document.getElementById('optionsList');
  const idx = list.querySelectorAll('.option-row').length;
  const row = document.createElement('div');
  row.className = 'option-row';
  row.innerHTML = `
    <span class="option-pill">${LABELS[idx] || idx+1}</span>
    <input type="text" placeholder="Option ${LABELS[idx] || idx+1}…" />
    <button class="btn-remove" onclick="removeOption(this)">×</button>
  `;
  list.appendChild(row);
  row.querySelector('input').focus();
}

function removeOption(btn) {
  const rows = document.querySelectorAll('.option-row');
  if (rows.length <= 2) return;
  btn.closest('.option-row').remove();
  updateLabels();
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = '⚠️ ' + msg;
  box.style.display = 'block';
}

function hideError() {
  document.getElementById('errorBox').style.display = 'none';
}

async function analyze() {
  hideError();
  const situation = document.getElementById('situation').value.trim();
  const options = [...document.querySelectorAll('.option-row input')]
    .map(i => i.value.trim()).filter(Boolean);

  if (!situation) { showError('Please describe your situation first!'); return; }
  if (options.length < 2) { showError('Add at least 2 options to compare.'); return; }

  const btn = document.getElementById('analyzeBtn');
  btn.disabled = true;
  btn.classList.add('loading');
  document.getElementById('results').classList.remove('visible');

  const prompt = `You are a sharp strategic advisor. Analyze this decision and return ONLY a valid JSON object with no markdown, no backticks, no explanation outside the JSON.

Situation: ${situation}

Options:
${options.map((o, i) => `${i+1}. ${o}`).join('\n')}

Return exactly this JSON (keep all string values under 15 words each):

{"options":[{"name":"string","pros":["string","string"],"cons":["string","string"],"risks":["string"],"short_term":"string","long_term":"string","score":"high|medium|low"}],"comparison":[{"dim":"string","vals":["string","string"]}],"verdict":{"winner":"exact option name string","reasoning":"string","others_lose":"string","confidence":"high|medium|low","conf_reason":"string","plan":["string","string","string"]}}

Important: winner must exactly match one of the option names. Return ONLY the JSON, nothing else.`;

  try {
    const response = await fetch("/api/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt })
    });

    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'API error');

    const raw = data.result || '';
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Could not parse response. Please try again.');
    const parsed = JSON.parse(jsonMatch[0]);
    renderResults(parsed);

  } catch(err) {
    showError(err.message + ' — Please try again.');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

function esc(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderResults(data) {
  const winnerName = data.verdict.winner;

  // Option cards
  const grid = document.getElementById('optionCards');
  grid.innerHTML = '';
  data.options.forEach((opt, i) => {
    const isBest = opt.name === winnerName;
    const card = document.createElement('div');
    card.className = `option-card${isBest ? ' best-card' : ''}`;
    card.style.animationDelay = (i * 0.08) + 's';
    const scoreEmoji = opt.score === 'high' ? '💚' : opt.score === 'medium' ? '💛' : '🔴';
    card.innerHTML = `
      ${isBest ? '<div class="best-badge">⭐ Best Pick</div>' : ''}
      <div class="opt-name">${esc(opt.name)}</div>
      <div class="score-chip ${opt.score}">${scoreEmoji} ${opt.score.charAt(0).toUpperCase()+opt.score.slice(1)} viability</div>
      <div class="opt-section">
        <div class="opt-section-label" style="color:#2a9060">✅ Pros</div>
        <div class="tag-row">${(opt.pros||[]).map(p=>`<span class="tag pro">${esc(p)}</span>`).join('')}</div>
      </div>
      <div class="opt-section">
        <div class="opt-section-label" style="color:#c0385a">❌ Cons</div>
        <div class="tag-row">${(opt.cons||[]).map(c=>`<span class="tag con">${esc(c)}</span>`).join('')}</div>
      </div>
      <div class="opt-section">
        <div class="opt-section-label" style="color:#a07000">⚠️ Hidden Risks</div>
        <div class="tag-row">${(opt.risks||[]).map(r=>`<span class="tag risk">${esc(r)}</span>`).join('')}</div>
      </div>
      <div class="opt-section">
        <div class="opt-section-label" style="color:#7a6890">⏱️ Short-term</div>
        <div class="outcome-box">${esc(opt.short_term)}</div>
      </div>
      <div class="opt-section">
        <div class="opt-section-label" style="color:#7a6890">🔭 Long-term</div>
        <div class="outcome-box">${esc(opt.long_term)}</div>
      </div>
    `;
    grid.appendChild(card);
  });

  // Comparison table
  const table = document.getElementById('compareTable');
  const optNames = data.options.map(o => o.name);
  table.innerHTML = `
    <thead><tr>
      <th></th>
      ${optNames.map(n => `<th>${esc(n)}</th>`).join('')}
    </tr></thead>
    <tbody>
      ${(data.comparison||[]).map(row => `
        <tr>
          <td>${esc(row.dim)}</td>
          ${(row.vals||[]).map((v, i) => `<td class="${optNames[i]===winnerName?'winner-cell':''}">${esc(v)}</td>`).join('')}
        </tr>
      `).join('')}
    </tbody>
  `;

  // Verdict
  const v = data.verdict;
  const confPct = v.confidence === 'high' ? 90 : v.confidence === 'medium' ? 55 : 25;
  document.getElementById('verdictBlock').innerHTML = `
    <div class="verdict-card">
      <div class="verdict-eyebrow">🏆 Best Decision</div>
      <div class="verdict-winner">${esc(v.winner)}</div>
      <div class="verdict-section">
        <div class="verdict-section-label">💡 Why it wins</div>
        <div class="verdict-section-content">${esc(v.reasoning)}</div>
      </div>
      <div class="verdict-section">
        <div class="verdict-section-label">📉 Why others fall short</div>
        <div class="verdict-section-content">${esc(v.others_lose)}</div>
      </div>
      <div class="verdict-section">
        <div class="verdict-section-label">🎯 Confidence Level</div>
        <div class="conf-row">
          <div class="conf-track"><div class="conf-fill" id="confFill" style="width:0%"></div></div>
          <span class="conf-chip ${v.confidence}">${v.confidence.toUpperCase()}</span>
        </div>
        <div style="font-size:13px;color:var(--text-mid);margin-top:8px;font-weight:500">${esc(v.conf_reason)}</div>
      </div>
      <div class="verdict-section">
        <div class="verdict-section-label">🚀 Your Action Plan</div>
        <div class="exec-steps">
          ${(v.plan||[]).map((s,i) => `
            <div class="exec-step">
              <span class="step-bubble">${i+1}</span>
              <span class="step-text">${esc(s)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;

  const results = document.getElementById('results');
  results.classList.add('visible');
  results.scrollIntoView({ behavior: 'smooth', block: 'start' });

  setTimeout(() => {
    const fill = document.getElementById('confFill');
    if (fill) fill.style.width = confPct + '%';
  }, 500);
}
</script>
</body>
</html>
